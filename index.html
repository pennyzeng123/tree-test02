function startTest(){
  const inputEl = document.getElementById('nameInput');
  const inputValue = inputEl ? inputEl.value.trim() : '';
  userName = inputValue || '你';
  current = 0;
  answers = {};
  const shuffled = [...allQuestions].sort(() => Math.random() - 0.5);
  questions = shuffled.slice(0, 12);
  render();
}

function save(id, i){ answers[id] = [i]; }
function autoNext(){ setTimeout(() => next(), 200); }
function prev(){ if(current > 0){ current -= 1; render(); } }
function next(){ if(current < questions.length - 1){ current += 1; render(); } else { submit(); } }

function render(){
  if(!questions.length){ startPage(); return; }
  const q = questions[current];
  const progress = Math.round((current + 1) / questions.length * 100);
  app.innerHTML = `
    <div style="height:16px;background:#e6f5d0;border-radius:12px;overflow:hidden;margin-bottom:20px;">
      <div style="height:100%;width:${progress}%;background:linear-gradient(90deg,#a8e063,#ffd95a);transition:width 0.3s;"></div>
    </div>
    <div style="font-size:24px;color:#6b8e23;margin-bottom:16px;font-weight:bold">第 ${current + 1} / ${questions.length} 题</div>
    <h3>${q.text}</h3>
    ${q.options.map((o, i) => `
      <label>
        <input name="q${q.id}" type="radio" onchange="save(${q.id},${i}); autoNext()" ${answers[q.id]?.includes(i) ? 'checked' : ''} />
        ${o.text}
      </label>`).join('')}
    <button onclick="prev()">上一题</button>
    <button onclick="next()">${current === questions.length - 1 ? '查看结果' : '下一题'}</button>`;
}

function calc(){
  scores = {E:0,I:0,S:0,N:0,T:0,F:0,J:0,P:0};
  questions.forEach((q) => {
    (answers[q.id] || []).forEach((i) => {
      const opt = q.options[i];
      if(opt && Object.prototype.hasOwnProperty.call(scores, opt.axis)) {
        scores[opt.axis] += opt.weight;
      }
    });
  });
}

function getType(){
  return (scores.E >= scores.I ? 'E' : 'I') + (scores.S >= scores.N ? 'S' : 'N') + (scores.T >= scores.F ? 'T' : 'F') + (scores.J >= scores.P ? 'J' : 'P');
}

function hash(str){
  let h = 0;
  for(let i = 0; i < str.length; i += 1){
    h = (h << 5) - h + str.charCodeAt(i);
    h |= 0;
  }
  return Math.abs(h);
}

function pickTree(){
  const seed = JSON.stringify(answers) + getType();
  return allTrees[hash(seed) % allTrees.length];
}

function downloadCard(tree, text, analysis){
  const canvas = document.createElement('canvas');
  canvas.width = 600;
  canvas.height = 980;
  const ctx = canvas.getContext('2d');
  if(!ctx){
    window.alert('结果卡片暂时无法生成');
    return;
  }

  ctx.fillStyle = '#f5fff7';
  ctx.fillRect(0, 0, 600, 980);
  ctx.fillStyle = '#333';
  ctx.font = '28px sans-serif';
  ctx.fillText(`${userName} 类似一棵${tree}`, 50, 90);
  ctx.font = '20px sans-serif';
  ctx.fillText(`${userName} 被树抱住了一下`, 50, 130);
  ctx.font = '18px sans-serif';

  const parts = String(analysis || '').split('\n\n');
  wrapText(ctx, parts[0] || '', 50, 190, 500, 28);
  wrapText(ctx, parts[1] || '', 50, 280, 500, 28);
  wrapText(ctx, parts[2] || '', 50, 400, 500, 28);
  wrapText(ctx, parts[3] || '', 50, 500, 500, 28);
  wrapText(ctx, parts[4] || '', 50, 570, 500, 28);
  wrapText(ctx, parts[5] || '', 50, 640, 500, 28);
  wrapText(ctx, parts[6] || '', 50, 690, 500, 28);
  wrapText(ctx, parts[7] || '', 50, 790, 500, 28);
  wrapText(ctx, text || '', 50, 860, 500, 28);

  ctx.font = '16px sans-serif';
  wrapText(ctx, '微信公众号:抱抱小树', 50, 920, 500, 24);
  wrapText(ctx, '测试仅供参考哦｜设计开发:潮玩ip抱抱小树', 50, 945, 500, 24);

  try {
    const dataUrl = canvas.toDataURL('image/png');
    const link = document.createElement('a');
    link.download = `${userName || 'tree'}-${tree}-result.png`;
    link.href = dataUrl;
    link.style.display = 'none';
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
  } catch (e) {
    const dataUrl = canvas.toDataURL('image/png');
    const newWindow = window.open();
    if(newWindow){
      newWindow.document.write(`<img src="${dataUrl}" style="max-width:100%;display:block;margin:0 auto;" />`);
    } else {
      window.alert('浏览器拦截了下载，请允许弹窗后重试');
    }
  }
}

function wrapText(ctx, text, x, y, maxWidth, lineHeight){
  let line = '';
  const chars = (text || '').split('');
  for(let i = 0; i < chars.length; i += 1){
    const test = line + chars[i];
    const metrics = ctx.measureText(test);
    if(metrics.width > maxWidth && i > 0){
      ctx.fillText(line, x, y);
      line = chars[i];
      y += lineHeight;
    } else {
      line = test;
    }
  }
  ctx.fillText(line, x, y);
}

function hugEffect(tree){
  const el = document.getElementById('hugText');
  if(!el) return;
  el.innerText = `${tree} 抱了抱${userName || '你'}`;
  el.style.opacity = 1;
  el.style.transform = 'translate(-50%,-50%) scale(1.1)';
  setTimeout(() => {
    el.style.opacity = 0;
    el.style.transform = 'translate(-50%,-50%) scale(0.8)';
  }, 1200);
}
